<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AHU Builder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left Panel ─────────────────────────────────────────── */
    #left-panel {
      width: 500px;
      min-width: 500px;
      display: flex;
      flex-direction: column;
      background: white;
      border-right: 1px solid #ccc;
      overflow: hidden;
    }

    #input-row {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #F5F5F5;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }

    .input-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .input-group label {
      font-size: 12px;
      text-align: center;
      color: #333;
    }

    .input-group input {
      width: 100%;
      max-width: 160px;
      text-align: center;
      padding: 5px 8px;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-size: 13px;
    }

    #dropdowns-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px;
    }

    /* ── Dropdown Sections ──────────────────────────────────── */
    details.dropdown-section {
      background: #F5F5F5;
      border: 1px solid #ccc;
      border-radius: 3px;
      margin-bottom: 6px;
    }

    details.dropdown-section summary {
      padding: 8px 10px;
      background: #D0D0D0;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      user-select: none;
      list-style: none;
      border-radius: 2px;
    }
    details.dropdown-section summary::-webkit-details-marker { display: none; }
    details.dropdown-section summary::after { content: " \25BC"; }
    details.dropdown-section[open] summary::after { content: " \25B2"; }

    .dropdown-content {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      padding: 8px;
    }

    .component-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 4px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      text-align: center;
      line-height: 1.3;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }
    .component-btn:hover { background: #e8f0fe; border-color: #4a90e2; }
    .component-btn img { width: 70px; height: 70px; object-fit: contain; }

    /* Delete button on custom component cards */
    .component-btn .btn-delete {
      display: none;
      position: absolute;
      top: 3px;
      right: 4px;
      font-size: 13px;
      color: #c00;
      line-height: 1;
      cursor: pointer;
      z-index: 1;
    }
    .component-btn:hover .btn-delete { display: block; }

    /* ── Add Custom Component Button ────────────────────────── */
    #add-custom-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 8px;
      margin-top: 2px;
      background: #e8f4e8;
      border: 1px dashed #5a9e5a;
      border-radius: 4px;
      color: #3a7a3a;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #add-custom-btn:hover { background: #d4edda; }

    /* ── Modal ──────────────────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: white;
      border-radius: 6px;
      padding: 24px;
      width: 480px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }

    #modal h3 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #222;
    }

    .modal-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }

    .modal-field label {
      font-size: 12px;
      font-weight: 600;
      color: #444;
    }

    .modal-field input {
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-size: 13px;
    }
    .modal-field input:focus { outline: none; border-color: #4a90e2; }

    .modal-field .hint {
      font-size: 11px;
      color: #888;
    }

    .modal-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    .btn-cancel {
      padding: 7px 16px;
      background: #eee;
      border: 1px solid #ccc;
      border-radius: 3px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-cancel:hover { background: #ddd; }

    .btn-save {
      padding: 7px 16px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .btn-save:hover { background: #357abd; }

    #modal-image-preview {
      width: 70px;
      height: 70px;
      object-fit: contain;
      border: 1px solid #ddd;
      border-radius: 3px;
      margin-top: 6px;
    }

    /* ── Right Panel ────────────────────────────────────────── */
    #right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #F0F0F0;
      overflow: hidden;
      min-width: 0;
    }

    /* ── Visual Frame ───────────────────────────────────────── */
    #visual-frame {
      flex: 1;
      background: white;
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid #ccc;
      overflow: hidden;
    }

    #visual-frame h2 {
      font-size: 15px;
      padding: 7px 12px;
      flex-shrink: 0;
    }

    #image-container {
      flex: 1;
      display: flex;
      align-items: center;
      overflow-x: auto;
      padding: 10px;
      gap: 6px;
      min-height: 0;
    }

    #image-container-empty {
      color: #aaa;
      font-size: 13px;
      pointer-events: none;
    }

    .visual-component {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 8px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
      cursor: grab;
      flex-shrink: 0;
      min-width: 110px;
      font-size: 11px;
      text-align: center;
      line-height: 1.4;
      user-select: none;
      transition: opacity 0.15s, border-color 0.1s;
    }
    .visual-component:active { cursor: grabbing; }
    .visual-component.dragging { opacity: 0.35; }
    .visual-component.drag-over-left  { border-left:  3px solid #4a90e2; }
    .visual-component.drag-over-right { border-right: 3px solid #4a90e2; }
    .visual-component img { width: 90px; height: 90px; object-fit: contain; }

    /* ── Bottom Frame ───────────────────────────────────────── */
    #bottom-frame {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── List Frame ─────────────────────────────────────────── */
    #list-frame {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #E8E8E8;
      border-right: 1px solid #ccc;
      overflow: hidden;
    }

    #list-frame h2 {
      font-size: 14px;
      font-weight: bold;
      padding: 6px 12px;
      text-align: center;
      flex-shrink: 0;
    }

    #component-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 6px;
    }

    .component-row {
      display: flex;
      align-items: center;
      padding: 0 8px;
      height: 36px;
      background: white;
      border-radius: 3px;
      margin-bottom: 3px;
      cursor: grab;
      user-select: none;
      border: 1px solid transparent;
      transition: background 0.12s;
    }
    .component-row:active { cursor: grabbing; }
    .component-row:hover { background: #CCE0FF; }
    .component-row.dragging { opacity: 0.35; }
    .component-row.drag-over-top    { border-top:    2px solid #4a90e2; }
    .component-row.drag-over-bottom { border-bottom: 2px solid #4a90e2; }

    .row-label { flex: 1; font-size: 13px; }

    .delete-btn {
      display: none;
      cursor: pointer;
      font-size: 15px;
      padding: 0 2px;
      color: #555;
      line-height: 1;
    }
    .component-row:hover .delete-btn { display: block; }
    .delete-btn:hover { color: #c00; }

    /* ── Summary Frame ──────────────────────────────────────── */
    #summary-frame {
      flex: 1;
      background: #DADADA;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #summary-frame h2 {
      font-size: 14px;
      font-weight: bold;
      padding: 6px 12px;
      text-align: center;
      flex-shrink: 0;
    }

    .summary-field {
      font-size: 13px;
      padding: 4px 14px;
      color: #222;
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ── Left Panel ────────────────────────────────────────── -->
  <div id="left-panel">
    <div id="input-row">
      <div class="input-group">
        <label for="cfm-entry">Airflow CFM:</label>
        <input type="number" id="cfm-entry" min="0" placeholder="0">
      </div>
      <div class="input-group">
        <label for="esp-entry">External Static Pressure (in. w.g.)</label>
        <input type="number" id="esp-entry" min="0" step="0.01" placeholder="0">
      </div>
    </div>
    <div id="dropdowns-wrapper">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- ── Right Panel ───────────────────────────────────────── -->
  <div id="right-panel">
    <div id="visual-frame">
      <h2>AHU Layout</h2>
      <div id="image-container"
           ondragover="onContainerDragOver(event)"
           ondrop="onContainerDrop(event)">
        <span id="image-container-empty">Add components from the left panel to begin.</span>
      </div>
    </div>
    <div id="bottom-frame">
      <div id="list-frame">
        <h2>Components Included</h2>
        <div id="component-list"
             ondragover="onListDragOver(event)"
             ondrop="onListDrop(event)"
             ondragleave="onListDragLeave(event)">
        </div>
      </div>
      <div id="summary-frame">
        <h2>AHU Summary</h2>
        <div class="summary-field" id="sum-model-size">Model Size: -</div>
        <div class="summary-field" id="sum-cfm">CFM: -</div>
        <div class="summary-field" id="sum-tsp">TSP: -</div>
        <div class="summary-field" id="sum-dimensions">Overall Dimensions: -</div>
        <div class="summary-field" id="sum-weight">Total Weight: -</div>
        <div class="summary-field" id="sum-bhp">BHP: -</div>
      </div>
    </div>
  </div>
</div>

<!-- ── Add Custom Component Modal ────────────────────────────── -->
<div id="modal-overlay" onclick="handleOverlayClick(event)">
  <div id="modal">
    <h3>Add Custom Component</h3>

    <div class="modal-field">
      <label>Component Name *</label>
      <input type="text" id="m-name" placeholder="e.g. My Custom Filter">
    </div>

    <div class="modal-field">
      <label>Applies to Sizes *</label>
      <input type="text" id="m-sizes" placeholder="e.g. 45,60,85 or leave blank for all">
      <span class="hint">Comma-separated list of sizes, or leave blank to apply to all sizes.</span>
    </div>

    <div class="modal-field">
      <label>ISP (in. w.g.) *</label>
      <input type="number" id="m-isp" step="0.01" placeholder="0.00">
    </div>

    <div class="modal-row">
      <div class="modal-field" style="margin-bottom:0">
        <label>Length (in.) *</label>
        <input type="number" id="m-length" min="0" placeholder="0">
      </div>
      <div class="modal-field" style="margin-bottom:0">
        <label>Width (in.) *</label>
        <input type="number" id="m-width" min="0" placeholder="0">
      </div>
      <div class="modal-field" style="margin-bottom:0">
        <label>Height (in.) *</label>
        <input type="number" id="m-height" min="0" placeholder="0">
      </div>
    </div>

    <div class="modal-field">
      <label>Weight (lb) *</label>
      <input type="number" id="m-weight" min="0" placeholder="0">
    </div>

    <div class="modal-field">
      <label>Image (optional)</label>
      <input type="file" id="m-image" accept="image/*">
      <img id="modal-image-preview" src="images/placeholder.png" alt="Preview">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveCustomComponent()">Add Component</button>
    </div>
  </div>
</div>

// ── State ─────────────────────────────────────────────────────
let catalog = { ...BASE_CATALOG };   // merged base + custom
let customComponents = [];           // [{key, label, img, sizes, dimensions, weight, isp}]
let ahuComponents = [];              // [{name, size, label, data}]
let cfm = 0;
let esp = 0;

// ── Custom Component Persistence ──────────────────────────────
function loadCustomComponents() {
  try {
    const stored = localStorage.getItem(CUSTOM_STORAGE_KEY);
    customComponents = stored ? JSON.parse(stored) : [];
  } catch {
    customComponents = [];
  }
  rebuildCatalog();
}

function saveCustomComponents() {
  localStorage.setItem(CUSTOM_STORAGE_KEY, JSON.stringify(customComponents));
  rebuildCatalog();
}

function rebuildCatalog() {
  catalog = { ...BASE_CATALOG };
  for (const cc of customComponents) {
    const entry = { label: cc.label };
    const targetSizes = cc.sizes.length ? cc.sizes : AHU_INCREMENTS.map(String);
    for (const size of targetSizes) {
      entry[size] = {
        dimensions: { length: cc.length, width: cc.width, height: cc.height },
        weight: cc.weight,
        isp: cc.isp,
        image: cc.img || PLACEHOLDER_IMG
      };
    }
    catalog[cc.key] = entry;
  }
}

// ── AHU Calculations ──────────────────────────────────────────
function sizeFromCFM(cfmVal) {
  if (cfmVal <= 0) return null;
  const req = Math.ceil(cfmVal / 100);
  for (const s of AHU_INCREMENTS) {
    if (s >= req) return String(s);
  }
  return null;
}

function getModelSize()  { return sizeFromCFM(cfm); }
function getAHUWeight()  { return ahuComponents.reduce((s, c) => s + c.data.weight, 0); }
function getISP()        { return ahuComponents.reduce((s, c) => s + c.data.isp, 0); }
function getTSP()        { return esp + getISP(); }
function getBHP()        { return (getTSP() * cfm) / (6356 * 0.65); }

function getAHUDimensions() {
  if (!ahuComponents.length) return { length: 0, width: 0, height: 0 };
  return {
    length: ahuComponents.reduce((s, c) => s + c.data.dimensions.length, 0),
    width:  Math.max(...ahuComponents.map(c => c.data.dimensions.width)),
    height: Math.max(...ahuComponents.map(c => c.data.dimensions.height))
  };
}

// ── Component Management ──────────────────────────────────────
function addComponent(key) {
  const size = getModelSize();
  if (!size) {
    alert("Please enter a valid CFM value before adding components.");
    return;
  }
  const entry = catalog[key];
  if (!entry || !entry[size]) {
    alert(`Size ${size} is not available for this component.`);
    return;
  }
  ahuComponents.push({ name: key, size, label: entry.label, data: entry[size] });
  updateDisplay();
}

function removeComponent(index) {
  ahuComponents.splice(index, 1);
  updateDisplay();
}

function moveComponent(fromIndex, toIndex) {
  if (fromIndex === toIndex) return;
  if (fromIndex < toIndex) toIndex -= 1;
  const [comp] = ahuComponents.splice(fromIndex, 1);
  ahuComponents.splice(toIndex, 0, comp);
}

// ── Display ───────────────────────────────────────────────────
function updateDisplay() {
  updateVisualArea();
  updateComponentList();
  updateSummary();
}

function updateVisualArea() {
  const container = document.getElementById('image-container');
  const empty     = document.getElementById('image-container-empty');

  container.querySelectorAll('.visual-component').forEach(el => el.remove());

  if (!ahuComponents.length) { empty.style.display = ''; return; }
  empty.style.display = 'none';

  ahuComponents.forEach((comp, index) => {
    const div = document.createElement('div');
    div.className = 'visual-component';
    div.draggable = true;
    div.dataset.index = index;

    const img = document.createElement('img');
    img.src = comp.data.image;
    img.alt = comp.label;
    img.onerror = () => { img.src = PLACEHOLDER_IMG; };

    const lbl = document.createElement('span');
    lbl.textContent = `${comp.label}\nSize ${comp.size}`;
    lbl.style.whiteSpace = 'pre-line';

    div.appendChild(img);
    div.appendChild(lbl);

    div.addEventListener('dragstart',  onVisualDragStart);
    div.addEventListener('dragend',    onVisualDragEnd);
    div.addEventListener('dragover',   onVisualItemDragOver);
    div.addEventListener('dragleave',  onVisualItemDragLeave);
    div.addEventListener('drop',       onVisualItemDrop);

    container.appendChild(div);
  });
}

function updateComponentList() {
  const list = document.getElementById('component-list');
  list.innerHTML = '';

  ahuComponents.forEach((comp, index) => {
    const row = document.createElement('div');
    row.className = 'component-row';
    row.draggable = true;
    row.dataset.index = index;

    const lbl = document.createElement('span');
    lbl.className = 'row-label';
    lbl.textContent = comp.label;

    const del = document.createElement('span');
    del.className = 'delete-btn';
    del.textContent = '\uD83D\uDDD1';
    del.title = 'Remove';
    del.addEventListener('click', e => { e.stopPropagation(); removeComponent(index); });

    row.appendChild(lbl);
    row.appendChild(del);
    row.addEventListener('dragstart', onListDragStart);
    row.addEventListener('dragend',   onListDragEnd);

    list.appendChild(row);
  });
}

function updateSummary() {
  const size    = getModelSize();
  const dims    = getAHUDimensions();
  const hasComps = ahuComponents.length > 0;

  document.getElementById('sum-model-size').textContent  = `Model Size: ${size ?? '-'}`;
  document.getElementById('sum-cfm').textContent         = `CFM: ${cfm ? cfm.toLocaleString() : '-'}`;
  document.getElementById('sum-tsp').textContent         = hasComps ? `TSP: ${getTSP().toFixed(2)} in.w.g.` : 'TSP: -';
  document.getElementById('sum-dimensions').textContent  = hasComps
    ? `Overall Dimensions: ${dims.length}" L \xD7 ${dims.width}" W \xD7 ${dims.height}" H`
    : 'Overall Dimensions: -';
  document.getElementById('sum-weight').textContent      = hasComps ? `Total Weight: ${getAHUWeight().toLocaleString()} lb` : 'Total Weight: -';
  document.getElementById('sum-bhp').textContent         = (hasComps && cfm) ? `BHP: ${getBHP().toFixed(3)}` : 'BHP: -';
}

// ── Build Dropdowns ───────────────────────────────────────────
function buildDropdowns() {
  const wrapper = document.getElementById('dropdowns-wrapper');
  wrapper.innerHTML = '';

  // Base categories
  BASE_CATEGORIES.forEach(cat => {
    wrapper.appendChild(buildCategoryDetails(cat.name, cat.items, false));
  });

  // Custom components section
  const customItems = customComponents.map(cc => ({
    label: cc.label,
    key:   cc.key,
    img:   cc.img || PLACEHOLDER_IMG,
    isCustom: true
  }));
  const customDetails = buildCategoryDetails('Custom Components', customItems, true);
  customDetails.open = true;
  wrapper.appendChild(customDetails);

  // "Add custom component" button inside the custom section
  const addBtn = document.createElement('button');
  addBtn.id = 'add-custom-btn';
  addBtn.textContent = '+ Add Custom Component';
  addBtn.onclick = openModal;
  wrapper.appendChild(addBtn);
}

function buildCategoryDetails(name, items, isCustom) {
  const details = document.createElement('details');
  details.className = 'dropdown-section';

  const summary = document.createElement('summary');
  summary.textContent = name;
  details.appendChild(summary);

  const content = document.createElement('div');
  content.className = 'dropdown-content';

  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'component-btn';
    btn.onclick = () => addComponent(item.key);

    const img = document.createElement('img');
    img.src = item.img;
    img.alt = item.label;
    img.onerror = () => { img.src = PLACEHOLDER_IMG; };

    const lbl = document.createElement('span');
    lbl.textContent = item.label;

    btn.appendChild(img);
    btn.appendChild(lbl);

    if (isCustom) {
      const delBtn = document.createElement('span');
      delBtn.className = 'btn-delete';
      delBtn.textContent = '\u2715';
      delBtn.title = 'Delete custom component';
      delBtn.addEventListener('click', e => {
        e.stopPropagation();
        deleteCustomComponent(item.key);
      });
      btn.appendChild(delBtn);
    }

    content.appendChild(btn);
  });

  details.appendChild(content);
  return details;
}

// ── Custom Component Modal ────────────────────────────────────
let pendingImageDataUrl = null;

function openModal() {
  pendingImageDataUrl = null;
  document.getElementById('m-name').value   = '';
  document.getElementById('m-sizes').value  = '';
  document.getElementById('m-isp').value    = '';
  document.getElementById('m-length').value = '';
  document.getElementById('m-width').value  = '';
  document.getElementById('m-height').value = '';
  document.getElementById('m-weight').value = '';
  document.getElementById('m-image').value  = '';
  document.getElementById('modal-image-preview').src = PLACEHOLDER_IMG;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('m-name').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

document.getElementById('m-image').addEventListener('change', function () {
  const file = this.files[0];
  if (!file) { pendingImageDataUrl = null; document.getElementById('modal-image-preview').src = PLACEHOLDER_IMG; return; }
  const reader = new FileReader();
  reader.onload = e => {
    pendingImageDataUrl = e.target.result;
    document.getElementById('modal-image-preview').src = pendingImageDataUrl;
  };
  reader.readAsDataURL(file);
});

function saveCustomComponent() {
  const name   = document.getElementById('m-name').value.trim();
  const sizesRaw = document.getElementById('m-sizes').value.trim();
  const isp    = parseFloat(document.getElementById('m-isp').value);
  const length = parseFloat(document.getElementById('m-length').value);
  const width  = parseFloat(document.getElementById('m-width').value);
  const height = parseFloat(document.getElementById('m-height').value);
  const weight = parseFloat(document.getElementById('m-weight').value);

  if (!name)                          { alert('Component name is required.'); return; }
  if (isNaN(isp))                     { alert('ISP is required.'); return; }
  if (isNaN(length) || isNaN(width) || isNaN(height)) { alert('All dimensions are required.'); return; }
  if (isNaN(weight))                  { alert('Weight is required.'); return; }

  // Parse sizes
  let sizes = [];
  if (sizesRaw) {
    sizes = sizesRaw.split(',').map(s => s.trim()).filter(s => AHU_INCREMENTS.includes(Number(s)));
    if (!sizes.length) { alert('No valid sizes found. Valid sizes: ' + AHU_INCREMENTS.join(', ')); return; }
  }

  // Build a unique key
  const key = 'custom_' + name.replace(/\s+/g, '_') + '_' + Date.now();

  customComponents.push({
    key, label: name, img: pendingImageDataUrl || null,
    sizes, length, width, height, weight, isp
  });

  saveCustomComponents();
  buildDropdowns();
  closeModal();
}

function deleteCustomComponent(key) {
  if (!confirm('Remove this custom component?')) return;
  customComponents = customComponents.filter(c => c.key !== key);
  // Also remove from current AHU layout if present
  ahuComponents = ahuComponents.filter(c => c.name !== key);
  saveCustomComponents();
  buildDropdowns();
  updateDisplay();
}

// ── Visual Drag & Drop ────────────────────────────────────────
let visualDragSrcIndex = null;

function clearVisualIndicators() {
  document.querySelectorAll('.visual-component').forEach(el =>
    el.classList.remove('drag-over-left', 'drag-over-right')
  );
}

function onVisualDragStart(e) {
  visualDragSrcIndex = parseInt(e.currentTarget.dataset.index);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'visual');
}

function onVisualDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  clearVisualIndicators();
  visualDragSrcIndex = null;
}

function onVisualItemDragOver(e) {
  e.preventDefault();
  e.stopPropagation();
  e.dataTransfer.dropEffect = 'move';
  clearVisualIndicators();
  const target = e.currentTarget;
  const rect = target.getBoundingClientRect();
  target.classList.add(e.clientX < rect.left + rect.width / 2 ? 'drag-over-left' : 'drag-over-right');
}

function onVisualItemDragLeave(e) {
  e.currentTarget.classList.remove('drag-over-left', 'drag-over-right');
}

function onVisualItemDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  const target      = e.currentTarget;
  const targetIndex = parseInt(target.dataset.index);
  const rect        = target.getBoundingClientRect();
  const dropIndex   = e.clientX < rect.left + rect.width / 2 ? targetIndex : targetIndex + 1;
  clearVisualIndicators();
  if (visualDragSrcIndex !== null && visualDragSrcIndex !== dropIndex) {
    moveComponent(visualDragSrcIndex, dropIndex);
    updateDisplay();
  }
  visualDragSrcIndex = null;
}

function onContainerDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function onContainerDrop(e) {
  e.preventDefault();
  clearVisualIndicators();
  if (visualDragSrcIndex !== null) {
    moveComponent(visualDragSrcIndex, ahuComponents.length);
    updateDisplay();
  }
  visualDragSrcIndex = null;
}

// ── List Drag & Drop ──────────────────────────────────────────
let listDragSrcIndex = null;

function clearListIndicators() {
  document.querySelectorAll('.component-row').forEach(el =>
    el.classList.remove('drag-over-top', 'drag-over-bottom')
  );
}

function onListDragStart(e) {
  listDragSrcIndex = parseInt(e.currentTarget.dataset.index);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'list');
}

function onListDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  clearListIndicators();
  listDragSrcIndex = null;
}

function onListDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  clearListIndicators();
  const target = e.target.closest('.component-row');
  if (target) {
    const rect = target.getBoundingClientRect();
    target.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drag-over-top' : 'drag-over-bottom');
  }
}

function onListDragLeave(e) {
  if (!document.getElementById('component-list').contains(e.relatedTarget)) clearListIndicators();
}

function onListDrop(e) {
  e.preventDefault();
  clearListIndicators();
  if (listDragSrcIndex === null) return;
  const target = e.target.closest('.component-row');
  let dropIndex;
  if (!target) {
    dropIndex = ahuComponents.length;
  } else {
    const targetIndex = parseInt(target.dataset.index);
    const rect = target.getBoundingClientRect();
    dropIndex = e.clientY < rect.top + rect.height / 2 ? targetIndex : targetIndex + 1;
  }
  if (listDragSrcIndex !== dropIndex) {
    moveComponent(listDragSrcIndex, dropIndex);
    updateDisplay();
  }
  listDragSrcIndex = null;
}

// ── Input Handlers ────────────────────────────────────────────
document.getElementById('cfm-entry').addEventListener('input', function () {
  cfm = parseFloat(this.value) || 0;
  updateSummary();
});

document.getElementById('esp-entry').addEventListener('input', function () {
  esp = parseFloat(this.value) || 0;
  updateSummary();
});

// ── Init ──────────────────────────────────────────────────────
loadCustomComponents();
buildDropdowns();
updateDisplay();
</script>
</body>
</html>
